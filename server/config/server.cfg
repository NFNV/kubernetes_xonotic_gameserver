// Baseline Xonotic dedicated server configuration for the MVP container image.
// The container entrypoint writes runtime overrides into server.autoexec.cfg.

// Keep the server private by default during bring-up.
sv_public 0

// A neutral default hostname; override with XONOTIC_HOSTNAME at runtime.
hostname "Xonotic Dedicated Server"

// Conservative default player count for an MVP node size.
maxplayers 12

// Leave the MOTD simple and operator-friendly.
sv_motd "Welcome to the Xonotic dedicated server"

// The runtime-generated autoexec file may override this.
port 26000

// Keep a basic local server log by default.
log_file "server.log"
