apiVersion: v1
kind: ServiceAccount
metadata:
  name: xonotic-allocator-backend
  namespace: xonotic-allocator-backend
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: xonotic-allocation-writer
  namespace: xonotic-agones
rules:
  - apiGroups: ["allocation.agones.dev"]
    resources: ["gameserverallocations"]
    verbs: ["create", "get"]
  - apiGroups: ["agones.dev"]
    resources: ["fleets", "gameservers"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: xonotic-allocation-writer
  namespace: xonotic-agones
subjects:
  - kind: ServiceAccount
    name: xonotic-allocator-backend
    namespace: xonotic-allocator-backend
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: xonotic-allocation-writer
