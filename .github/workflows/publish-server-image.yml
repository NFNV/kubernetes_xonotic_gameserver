name: Publish Server Image

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - 'server/**'
      - '.github/workflows/publish-server-image.yml'

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Derive image coordinates
        id: image
        run: |
          set -eu
          owner="$(printf '%s' "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          image="ghcr.io/${owner}/xonotic-server"
          sha_tag="sha-$(printf '%s' "${GITHUB_SHA}" | cut -c1-12)"
          {
            echo "image=${image}"
            echo "connectivity_tag=connectivity-checkpoint"
            echo "sha_tag=${sha_tag}"
          } >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.image.outputs.image }}:${{ steps.image.outputs.connectivity_tag }}
            ${{ steps.image.outputs.image }}:${{ steps.image.outputs.sha_tag }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Summarize published tags
        run: |
          {
            echo "Published image:"
            echo "- ${{ steps.image.outputs.image }}:${{ steps.image.outputs.connectivity_tag }}"
            echo "- ${{ steps.image.outputs.image }}:${{ steps.image.outputs.sha_tag }}"
          } >> "${GITHUB_STEP_SUMMARY}"
